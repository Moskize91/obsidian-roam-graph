name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Read manifest version
        id: manifest
        run: |
          version="$(node -e 'console.log(require("./manifest.json").version)')"
          package_version="$(node -e 'console.log(require("./package.json").version)')"
          if [ -z "$version" ]; then
            echo "manifest.json version is empty" >&2
            exit 1
          fi
          if [ "$version" != "$package_version" ]; then
            echo "manifest.json version ($version) must match package.json version ($package_version)." >&2
            exit 1
          fi
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "manifest.json version must use x.y.z format: $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify release assets
        run: |
          test -f plugin-dist/main.js
          test -f plugin-dist/manifest.json
          test -f plugin-dist/styles.css

      - name: Ensure tag does not exist
        run: |
          if git ls-remote --exit-code --tags origin "${{ steps.manifest.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.manifest.outputs.version }} already exists." >&2
            exit 1
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.manifest.outputs.version }}" \
            plugin-dist/main.js \
            plugin-dist/manifest.json \
            plugin-dist/styles.css \
            --title "${{ steps.manifest.outputs.version }}" \
            --notes "Release ${{ steps.manifest.outputs.version }}"
